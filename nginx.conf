# Nginx Configuration for SapuKota
# Copy this file to: /etc/nginx/sites-available/sapukota
# Then create symlink: ln -s /etc/nginx/sites-available/sapukota /etc/nginx/sites-enabled/

server {
    listen 80;
    listen [::]:80;
    
    # CHANGE THIS: Replace with your domain or VPS IP
    server_name YOUR_VPS_IP_OR_DOMAIN;
    
    # Max upload size (for report photos)
    client_max_body_size 10M;

    # Frontend (React SPA)
    location / {
        root /var/www/SapuKota/frontend/dist;
        try_files $uri $uri/ /index.html;
        index index.html;
        
        # Cache static assets
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Backend API (Proxy to Node.js)
    location /api {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        
        # WebSocket support (if needed in future)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        
        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_cache_bypass $http_upgrade;
        
        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Uploads folder (static files)
    location /uploads {
        alias /var/www/SapuKota/backend/uploads;
        
        # Security: only allow images
        location ~ \.(jpg|jpeg|png|gif)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            add_header X-Content-Type-Options "nosniff";
        }
        
        # Deny access to other file types
        location ~ \. {
            deny all;
        }
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1000;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    # Logs
    access_log /var/log/nginx/sapukota_access.log;
    error_log /var/log/nginx/sapukota_error.log;
}

